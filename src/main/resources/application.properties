# ==================== SERVER ====================
# ==================== SERVER ====================
server.port=${PORT:8080}
spring.application.name=Sitegenius

# ==================== DATABASE ====================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==================== JWT ====================
app.jwt.secret=${APP_JWT_SECRET:sitegenius_super_key_12345_minimum_256_bits_long}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# ==================== SWAGGER ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==================== LOGGING ====================
logging.level.com.finabits.hrms=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==================== ADMIN DEFAULT SEED ====================
app.admin.default.email=admin@Sitegenius.com
app.admin.default.password=Admin@1234
app.admin.default.name=Super Admin